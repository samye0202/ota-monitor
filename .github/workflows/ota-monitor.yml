name: OTA竞品监控

on:
  schedule:
    # 每天北京时间 9:00 运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: '手动触发'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行 OTA 采集与页面生成
        run: python -m src.ota_monitor

      - name: 提交结果到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ota_updates.json docs/index.html
          git diff --staged --quiet || git commit -m "chore: update OTA report [$(date +%Y-%m-%d)]"
          git push
