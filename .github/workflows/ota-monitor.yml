name: OTA竞品监控

on:
  schedule:
    # 每天北京时间 9:00 运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: '手动触发'
        required: false
        default: 'true'

env:
  FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: 运行OTA监控
      run: python ota_monitor.py
      
    - name: 保存历史记录
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ota-history
        path: ota_history.json
        retention-days: 30
        
    - name: 提交历史记录到仓库
      if: always()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ota_history.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "Update OTA history [$(date +%Y-%m-%d)]"
        git push || true
